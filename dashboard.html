<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA BANK - Mon Compte</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f9ff;
            min-height: 100vh;
        }

        .header {
            background: #0b2440;
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .logo span {
            color: #ff6b4a;
        }

        .user-info {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 40px;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .balance {
            font-size: 3rem;
            font-weight: bold;
            color: #0b2440;
        }

        .info {
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .info strong {
            color: #ff6b4a;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: #0b2440;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            margin: 10px;
        }

        .error {
            color: red;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">NOVA<span>BANK</span></div>
        <div class="user-info" id="userEmail">Chargement...</div>
    </header>

    <div class="container">
        <div id="content">
            <div class="card" style="text-align: center;">
                <p>Chargement de vos données...</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://lvbdafzdsuotairqkcnv.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2YmRhZnpkc3VvdGFpcnFrY252Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNTg0MTUsImV4cCI6MjA4NjYzNDQxNX0.MWPo0ZnTNTzK4_8N1GB_mtri7LkgfP43W4gjBGB7zhI'
        );

        async function loadData() {
            try {
                // 1. Vérifier la connexion
                const { data: { user }, error } = await supabase.auth.getUser();
                
                if (error || !user) {
                    window.location.href = 'connexion.html';
                    return;
                }

                // 2. Afficher l'email
                document.getElementById('userEmail').textContent = user.email;

                // 3. Charger le profil
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();

                // 4. Afficher les données
                let html = '';
                
                if (profileError) {
                    html = `
                        <div class="card">
                            <h2>Bienvenue ${user.email}</h2>
                            <p>Votre profil est en cours de création...</p>
                            <p>Solde par défaut: 0 €</p>
                        </div>
                    `;
                } else {
                    html = `
                        <div class="card">
                            <h2>Bonjour ${profile.nom || user.email}</h2>
                            <div class="balance">${(profile.solde || 0).toFixed(2)} €</div>
                        </div>
                        
                        <div class="card">
                            <h3>Mes informations</h3>
                            <div class="info"><strong>Nom:</strong> ${profile.nom || '-'}</div>
                            <div class="info"><strong>Email:</strong> ${profile.email || '-'}</div>
                            <div class="info"><strong>Rôle:</strong> ${profile.role || 'user'}</div>
                            <div class="info"><strong>Membre depuis:</strong> ${new Date(profile.created_at).toLocaleDateString()}</div>
                        </div>
                        
                        <div style="text-align: center;">
                            <a href="retrait.html" class="btn">Effectuer un retrait</a>
                        </div>
                    `;
                }
                
                document.getElementById('content').innerHTML = html;

            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('content').innerHTML = `
                    <div class="card error">
                        <h3>❌ Erreur de chargement</h3>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" class="btn">Réessayer</button>
                    </div>
                `;
            }
        }

        loadData();
    </script>
</body>
</html>
