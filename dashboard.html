<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA BANK - Mon Compte</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f5f9ff;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        .header {
            background: #0b2440;
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .logo span {
            color: #ff6b4a;
        }

        .user-info {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .welcome-card {
            background: linear-gradient(135deg, #0b2440 0%, #1e3f6e 100%);
            color: white;
            padding: 30px;
            border-radius: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px -15px rgba(11,36,64,0.4);
        }

        .welcome-card h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .balance-card {
            background: white;
            border-radius: 40px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            border: 2px solid #eef2f6;
        }

        .balance-label {
            color: #5f738c;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .balance-amount {
            font-size: 3.5rem;
            font-weight: 700;
            color: #0b2440;
        }

        .balance-amount small {
            font-size: 1.2rem;
            color: #98aec6;
            font-weight: 400;
        }

        .info-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            border: 1px solid #eef2f6;
            margin-bottom: 20px;
        }

        .info-card h3 {
            color: #0b2440;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .info-card p {
            color: #5f738c;
            margin-bottom: 8px;
        }

        .info-card strong {
            color: #ff6b4a;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            background: #0b2440;
            color: white;
        }

        .btn:hover {
            background: #1e3f6e;
            transform: translateY(-3px);
        }

        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-top: 2px solid #ff6b4a;
            border-radius: 40px 40px 0 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8e9daf;
            cursor: pointer;
            background: none;
            border: none;
            text-decoration: none;
        }

        .nav-item.active {
            color: #ff6b4a;
        }

        .alert {
            padding: 15px;
            border-radius: 30px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #e3f5eb;
            color: #34a853;
        }

        .alert-error {
            background: #ffeae8;
            color: #ff6b4a;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">NOVA<span>BANK</span></div>
        <div class="user-info" id="userInfo">Bonjour, <span id="userName">...</span></div>
    </header>

    <div class="container">
        <div class="alert" id="alertMessage"></div>

        <div class="welcome-card">
            <h1 id="welcomeMessage">Bienvenue sur votre compte</h1>
            <p>Gérez votre argent en toute sécurité</p>
        </div>

        <div class="balance-card">
            <div class="balance-label">Solde disponible</div>
            <div class="balance-amount" id="userBalance">0,00 <small>€</small></div>
        </div>

        <div class="info-card">
            <h3>📋 Mes informations</h3>
            <p><strong>Nom :</strong> <span id="profileName">-</span></p>
            <p><strong>Email :</strong> <span id="profileEmail">-</span></p>
            <p><strong>Membre depuis :</strong> <span id="profileDate">-</span></p>
        </div>

        <div class="actions">
            <a href="retrait.html" class="btn">💳 Effectuer un retrait</a>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">Accueil</a>
        <a href="retrait.html" class="nav-item">Retrait</a>
        <button class="nav-item" onclick="logout()">Déconnexion</button>
    </nav>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://lvbdafzdsuotairqkcnv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2YmRhZnpkc3VvdGFpcnFrY252Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNTg0MTUsImV4cCI6MjA4NjYzNDQxNX0.MWPo0ZnTNTzK4_8N1GB_mtri7LkgfP43W4gjBGB7zhI';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadUserData() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser();
                
                if (error || !user) {
                    window.location.href = 'connexion.html';
                    return;
                }

                document.getElementById('userName').textContent = user.email?.split('@')[0] || 'Utilisateur';
                document.getElementById('welcomeMessage').textContent = `Bonjour ${user.email?.split('@')[0] || ''}`;

                const { data: profile } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();

                if (profile) {
                    document.getElementById('userBalance').innerHTML = (profile.solde || 0).toFixed(2).replace('.', ',') + ' <small>€</small>';
                    document.getElementById('profileName').textContent = profile.nom || '-';
                    document.getElementById('profileEmail').textContent = profile.email || '-';
                    document.getElementById('profileDate').textContent = new Date(profile.created_at).toLocaleDateString();
                }

            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'connexion.html';
        }

        loadUserData();
    </script>
</body>
</html>
